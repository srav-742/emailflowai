services:
  - type: web
    name: emailflowai-api
    env: node
    plan: starter
    region: oregon
    rootDirectory: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emailflowai-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
    healthCheckPath: /api/health

databases:
  - name: emailflowai-db
    plan: starter
    region: oregon
    databaseName: emailflowai
    user: admin
